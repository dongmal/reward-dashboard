name: Sync PointClick GA4 Data

on:
  schedule:
    # 지연 감안 UTC 19:00 설정 → 실제 실행 KST 오전 9시 전후
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: '수집 기간 (일). 비워두면 7일'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth google-analytics-data pymysql

      - name: Step 1 - Update Media Master
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID_PC_GA }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        run: |
          echo "📋 매체마스터 업데이트 중..."
          python create_media_master.py

      - name: Step 2 - Sync GA4 Data
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID_PC_GA }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GA4_POINTCLICK_PROPERTY_ID: ${{ secrets.GA4_POINTCLICK_PROPERTY_ID }}
        run: |
          echo "📊 GA4 데이터 수집 중..."
          if [ -n "${{ github.event.inputs.days }}" ]; then
            python sync_ga4_pointclick.py "${{ github.event.inputs.days }}"
          else
            python sync_ga4_pointclick.py
          fi
