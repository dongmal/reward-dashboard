name: Sync CashPlay GA4 Data

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: '수집 기간 (일). 비워두면 7일'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Show commit info
        run: |
          echo "=== 실행 커밋 정보 ==="
          git log --oneline -1
          echo "====================="

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase google-auth google-analytics-data

      - name: Sync GA4 Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GA4_CASHPLAY_PROPERTY_ID: ${{ secrets.GA4_CASHPLAY_PROPERTY_ID }}
        run: |
          if [ -n "${{ github.event.inputs.days }}" ]; then
            python sync_ga4_cashplay.py "${{ github.event.inputs.days }}"
          else
            python sync_ga4_cashplay.py
          fi
