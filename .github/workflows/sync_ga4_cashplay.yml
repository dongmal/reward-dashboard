name: Sync CashPlay GA4 Data

on:
  schedule:
    # 지연 감안 UTC 19:00 설정 → 실제 실행 KST 오전 9시 전후
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: '수집 기간 (일). 비워두면 90일'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth google-analytics-data

      - name: Sync GA4 Data
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID_CP_GA }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GA4_CASHPLAY_PROPERTY_ID: ${{ secrets.GA4_CASHPLAY_PROPERTY_ID }}
        run: |
          echo "📊 GA4 데이터 수집 중..."
          if [ -n "${{ github.event.inputs.days }}" ]; then
            python sync_ga4_cashplay.py "${{ github.event.inputs.days }}"
          else
            python sync_ga4_cashplay.py
          fi
