name: Sync CashPlay Data

on:
  schedule:
    - cron: '0 3 * * *'   # KST 12:00 (1차)
    - cron: '0 9 * * *'   # KST 18:00 (2차 재시도)
  workflow_dispatch:
    inputs:
      target_date:
        description: '적재할 날짜 (YYYY-MM-DD). 범위는 시작일만 입력'
        required: false
        type: string
      end_date:
        description: '범위 끝 날짜 (YYYY-MM-DD). 비워두면 단일 날짜'
        required: false
        type: string
      force:
        description: '기존 데이터 덮어쓰기'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Show commit info
        run: |
          echo "=== 실행 커밋 정보 ==="
          git log --oneline -1
          echo "====================="

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth supabase

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SOURCE_SPREADSHEET_ID: ${{ secrets.SOURCE_SPREADSHEET_ID }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.target_date }}"
            if [ -n "${{ github.event.inputs.end_date }}" ]; then
              ARGS="$ARGS ${{ github.event.inputs.end_date }}"
            fi
          fi
          python sync_cashplay.py $ARGS
